<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore Eastvale Innovators projects — from current builds to past initiatives across software, engineering, and community impact.">
  <title>Projects — Eastvale Innovators</title>
  <link rel="icon" type="image/png" href="assets/img/logo_favicon.png">
  <link rel="preload" as="image" href="assets/img/nebula1.jpg" fetchpriority="high">
  <link rel="preload" as="image" href="assets/img/nebula2.avif" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/pages.css">
  <style>
    /* ── SKY CONTAINER ── */
    .sky-section { padding: 4rem 0 6rem; }

    .sky-intro {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
      text-align: center;
    }

    .sky-hint {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-size: .75rem;
      color: rgba(200,220,255,.45);
      letter-spacing: .06em;
      margin-top: .75rem;
    }
    .sky-hint span { opacity: .5; }

    #sky-container {
      position: relative;
      width: min(1400px, calc(100% - 2rem));
      height: 78vh;
      min-height: 620px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 24px;
      cursor: grab;
      background:
        radial-gradient(circle at 20% 20%, rgba(26,107,255,.1), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0,212,255,.07), transparent 22%),
        radial-gradient(circle at 50% 70%, rgba(26,107,255,.05), transparent 30%),
        linear-gradient(180deg, rgba(6,14,28,.99), rgba(2,6,16,1));
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: 0 30px 80px rgba(0,0,0,.4), inset 0 0 80px rgba(26,107,255,.04);
      user-select: none;
      touch-action: none;
      transition: transform 0.3s ease, filter 0.35s ease;
    }
    #sky-container.dragging { cursor: grabbing; }
    #sky-container.warping { filter: brightness(1.06); transform: scale(1.006); }
    #sky-container::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.25) 100%);
      z-index: 10;
    }

    #nebula, #stars-back, #stars-mid, #stars-front, #fx-layer, #shooting-stars, #constellations {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    #nebula, #stars-back, #stars-mid, #stars-front, #fx-layer, #shooting-stars { pointer-events: none; }
    #nebula { z-index: 0; }
    #stars-back { z-index: 2; }
    #stars-mid { z-index: 3; }
    #stars-front { z-index: 4; }
    #fx-layer { z-index: 5; }
    #shooting-stars { z-index: 6; }
    #constellations { z-index: 7; overflow: visible; }

    /* ── CONSTELLATION STYLES ── */
    .constellation { cursor: pointer; }
    .constellation.filtered { opacity: .15; pointer-events: none; }

    .constellation-line {
      stroke: rgba(100,170,255,.3);
      stroke-width: 1.4;
      opacity: .7;
      stroke-dasharray: 130;
      stroke-dashoffset: 130;
      animation: drawLine 1.2s forwards;
      transition: opacity .35s, stroke .35s, stroke-width .35s, filter .35s;
    }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }

    .constellation-star {
      fill: rgba(255,255,255,.9);
      transition: transform .35s, opacity .35s, filter .35s, fill .35s;
      transform-origin: center;
    }
    .constellation-core {
      fill: rgba(160,210,255,.95);
      filter: drop-shadow(0 0 10px rgba(26,107,255,.8));
    }
    .constellation-label {
      font-family: 'Syne', sans-serif;
      font-size: 15px; fill: rgba(255,255,255,.9);
      letter-spacing: .04em; opacity: 0; transform: translateY(8px);
      transition: opacity .35s, transform .35s;
      pointer-events: none; text-transform: uppercase;
      filter: drop-shadow(0 0 8px rgba(26,107,255,.3));
    }
    .constellation-subtext {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; fill: rgba(200,220,255,.6);
      letter-spacing: .05em; opacity: 0; transform: translateY(8px);
      transition: opacity .35s .04s, transform .35s .04s;
      pointer-events: none; text-transform: uppercase;
    }
    .constellation:hover .constellation-line,
    .constellation.active .constellation-line {
      stroke: rgba(100,200,255,.9); stroke-width: 2; opacity: 1;
      filter: drop-shadow(0 0 6px rgba(26,107,255,.6));
    }
    .constellation:hover .constellation-star,
    .constellation.active .constellation-star {
      fill: rgba(200,235,255,1);
      filter: drop-shadow(0 0 10px rgba(100,200,255,.9));
    }
    .constellation:hover .constellation-label,
    .constellation:hover .constellation-subtext,
    .constellation.active .constellation-label,
    .constellation.active .constellation-subtext { opacity: 1; transform: translateY(0); }

    /* ── PROJECT PANEL ── */
    #project-panel {
      position: absolute; right: 2rem; bottom: 2rem;
      width: min(340px, calc(100% - 2rem));
      background: rgba(5,12,26,.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      padding: 1.5rem;
      color: white;
      box-shadow: 0 20px 50px rgba(0,0,0,.4);
      display: none; z-index: 30;
    }
    #project-panel.show { display: block; animation: panelFade .25s ease; }
    @keyframes panelFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    #close-panel {
      position: absolute; top: .8rem; right: .9rem;
      background: none; border: none; color: rgba(255,255,255,.5); font-size: .9rem; cursor: pointer;
    }
    #close-panel:hover { color: white; }
    #project-panel-content h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: .75rem; }
    #project-panel-content p { color: rgba(200,220,255,.75); font-size: .88rem; line-height: 1.65; }
    .project-meta { margin-top: .75rem; font-size: .78rem; color: rgba(200,220,255,.45); }

    .project-panel-tag {
      display: inline-flex; align-items: center; gap: .4rem;
      margin-bottom: .6rem; padding: .5rem .9rem;
      border-radius: 10px; border: 1px solid rgba(26,107,255,.5);
      background: rgba(26,107,255,.15); color: rgba(180,220,255,.95);
      font-size: .78rem; font-weight: 600; letter-spacing: .04em;
      text-transform: uppercase; text-decoration: none;
      transition: background .2s, border-color .2s; cursor: pointer;
      margin-right: .5rem;
    }
    a.project-panel-tag:hover { background: rgba(26,107,255,.3); border-color: rgba(100,200,255,.8); }

    /* ── SKY TOOLS ── */
    #sky-tools {
      position: absolute; top: 1rem; left: 1rem; z-index: 40;
      display: flex; gap: .35rem; align-items: center;
      padding: .4rem; border: 1px solid rgba(255,255,255,.08); border-radius: 12px;
      background: rgba(4,10,22,.85); backdrop-filter: blur(10px);
    }
    .sky-tool-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(200,220,255,.85); border-radius: 9px;
      padding: .4rem .65rem; font-size: .78rem; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background .2s, border-color .2s;
    }
    .sky-tool-btn:hover { border-color: rgba(26,107,255,.5); background: rgba(26,107,255,.12); }

    /* ── SEARCH ── */
    #project-picker-wrap {
      position: absolute; top: 1rem; right: 1rem; z-index: 40;
    }
    #project-search {
      width: min(260px, calc(100vw - 2rem));
      padding: .65rem .9rem;
      border-radius: 11px; border: 1px solid rgba(255,255,255,.1);
      background: rgba(4,10,22,.88); color: rgba(220,235,255,.95);
      font-family: 'DM Sans', sans-serif; font-size: .85rem; outline: none;
    }
    #project-search:focus { border-color: rgba(26,107,255,.6); box-shadow: 0 0 0 3px rgba(26,107,255,.15); }
    #project-search::placeholder { color: rgba(200,220,255,.3); }

    /* ── DIRECTORY ── */
    .project-directory {
      width: min(1400px, calc(100% - 2rem));
      margin: 1.5rem auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: .85rem;
    }
    .project-item {
      text-align: left; border: 1px solid rgba(255,255,255,.09);
      background: rgba(255,255,255,.03); border-radius: 14px;
      padding: 1rem 1.1rem; color: rgba(200,220,255,.9); cursor: pointer;
      transition: border-color .2s, transform .2s, background .2s;
    }
    .project-item:hover { transform: translateY(-2px); border-color: rgba(26,107,255,.4); background: rgba(26,107,255,.07); }
    .project-item.active { border-color: rgba(100,200,255,.9); background: rgba(26,107,255,.15); }
    .project-item h4 { margin: 0 0 .3rem; font-size: .92rem; font-family: 'Syne', sans-serif; font-weight: 700; color: #fff; }
    .project-item p { margin: 0; font-size: .78rem; color: rgba(200,220,255,.6); }
    .project-item .status {
      display: inline-block; margin-top: .4rem;
      padding: .22rem .5rem; border-radius: 999px;
      font-size: .68rem; border: 1px solid rgba(26,107,255,.35);
      color: rgba(160,210,255,.9); background: rgba(26,107,255,.12);
      text-transform: uppercase; letter-spacing: .06em;
    }
    .project-empty {
      grid-column: 1 / -1; text-align: center;
      color: rgba(200,220,255,.5); padding: 1.5rem;
      border: 1px dashed rgba(255,255,255,.12); border-radius: 14px;
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

    /* ── TILE TRANSITION ── */
    #tile-transition { position: fixed; inset: 0; z-index: 20000; pointer-events: none; display: grid; background: transparent; }
    .tile { background: #071428; opacity: 0; transform: scale(0.95); transition: opacity .28s ease, transform .28s ease; }
    .tile.active { opacity: 1; transform: scale(1); }

    @media (max-width: 768px) {
      #project-picker-wrap { top: .75rem; right: .75rem; left: .75rem; }
      #sky-tools { top: auto; bottom: .75rem; left: .75rem; right: .75rem; justify-content: center; flex-wrap: wrap; }
      #project-search { width: 100%; max-width: none; }
      #project-panel { right: .5rem; left: .5rem; width: auto; bottom: .75rem; }
      #sky-container { width: calc(100% - 1rem); height: 72vh; min-height: 500px; border-radius: 18px; }
    }
  </style>
</head>
<body>

<div id="site-header"></div>
<script src="assets/js/shared-header.js"></script>
<script src="assets/js/shared-footer.js?v=4-17-26"></script>
<script src="assets/js/site-common.js"></script>

<!-- ── HERO ── -->
<section class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <div class="page-hero-eyebrow">What We Ship</div>
    <h1>Our Projects</h1>
    <p class="page-hero-sub">Innovation in action across multiple disciplines — explore a live map of our builds.</p>
  </div>
</section>

<!-- ── CONSTELLATION SKY ── -->
<section class="sky-section">
  <div class="sky-intro">
    <span class="section-eyebrow">Interactive Sky Map</span>
    <h2 class="section-title" style="margin-top:.5rem">Explore Our Projects</h2>
    <div class="sky-hint">
      <span>Drag to explore</span>•<span>Scroll to zoom</span>•<span>Click a constellation to focus</span>•<span>Click empty space for a comet</span>
    </div>
  </div>

  <div id="sky-container">
    <div id="sky-tools" role="toolbar" aria-label="Sky controls">
      <button class="sky-tool-btn" id="zoom-in-btn" type="button">+ Zoom</button>
      <button class="sky-tool-btn" id="zoom-out-btn" type="button">− Zoom</button>

  <div class="project-directory" id="project-directory" aria-label="Project list"></div>

<div id="site-footer"></div>
<div id="tile-transition"></div>

<script>
  /* ── TILE TRANSITION ── */
  const tileContainer = document.getElementById('tile-transition');
  const TILE_ROWS = 12, TILE_COLS = 20;
  let tiles = [];
  function createTiles() {
    if (!tileContainer) return;
    tileContainer.innerHTML = '';
    tileContainer.style.gridTemplateRows = `repeat(${TILE_ROWS},1fr)`;
    tileContainer.style.gridTemplateColumns = `repeat(${TILE_COLS},1fr)`;
    tiles = [];
    for (let r = 0; r < TILE_ROWS; r++) for (let c = 0; c < TILE_COLS; c++) {
      const t = document.createElement('div'); t.className = 'tile';
      t.dataset.row = r; t.dataset.col = c;
      tileContainer.appendChild(t); tiles.push(t);
    }
  }
  function getTileOrder() { return tiles.slice().sort((a,b)=>(+a.dataset.row + +a.dataset.col)-(+b.dataset.row + +b.dataset.col)); }
  function coverTiles() { getTileOrder().forEach((t,i)=>setTimeout(()=>t.classList.add('active'),i*2)); }
  function revealTiles() { getTileOrder().reverse().forEach((t,i)=>setTimeout(()=>t.classList.remove('active'),i*2)); }
  function startTileNavigation(href) { coverTiles(); setTimeout(()=>window.location.href=href,tiles.length*2+200); }
  document.addEventListener('click', e => {
    const link = e.target.closest('a');
    if (!link) return;
    const href = link.getAttribute('href');
    if (!href || href.includes('#') || href.startsWith('mailto:') || href.startsWith('tel:') || link.target === '_blank') return;
    e.preventDefault(); startTileNavigation(href);
  });
  createTiles(); tiles.forEach(t=>t.classList.add('active')); setTimeout(revealTiles, 120);

  /* ── CONSTELLATION LOGIC (preserved from original) ── */
  const heroSection = document.querySelector('.page-hero');
  let targetStarX = 50, targetStarY = 50, currentStarX = 50, currentStarY = 50;

  document.addEventListener('mousemove', (e) => {
    if (!heroSection) return;
    const heroRect = heroSection.getBoundingClientRect();
    if (e.clientY < heroRect.bottom) {
      targetStarX = ((e.clientX - heroRect.left) / heroRect.width) * 100;
      targetStarY = ((e.clientY - heroRect.top) / heroRect.height) * 100;
    }
  });

  (function () {
    const sky = document.getElementById('sky-container');
    const svg = document.getElementById('constellations');
    const nebulaCanvas = document.getElementById('nebula');
    const backCanvas = document.getElementById('stars-back');
    const midCanvas = document.getElementById('stars-mid');
    const frontCanvas = document.getElementById('stars-front');
    const fxCanvas = document.getElementById('fx-layer');
    const shootingCanvas = document.getElementById('shooting-stars');
    const nebulaCtx = nebulaCanvas.getContext('2d');
    const backCtx = backCanvas.getContext('2d');
    const midCtx = midCanvas.getContext('2d');
    const frontCtx = frontCanvas.getContext('2d');
    const fxCtx = fxCanvas.getContext('2d');
    const shootingCtx = shootingCanvas.getContext('2d');
    const panel = document.getElementById('project-panel');
    const projectSearch = document.getElementById('project-search');
    const projectDirectory = document.getElementById('project-directory');
    const panelContent = document.getElementById('project-panel-content');
    const closePanelBtn = document.getElementById('close-panel');
    const zoomInBtn = document.getElementById('zoom-in-btn');
    const zoomOutBtn = document.getElementById('zoom-out-btn');
    const fitViewBtn = document.getElementById('fit-view-btn');
    const SVG_NS = "http://www.w3.org/2000/svg";
    const world = { width: 2400, height: 1800 };
    const camera = { x: world.width/2, y: world.height/2, zoom: 1, targetX: world.width/2, targetY: world.height/2, targetZoom: 1, vx: 0, vy: 0, isDragging: false, isAutoCentering: false, lastPointerX: 0, lastPointerY: 0 };
    const ZOOM_MIN = 0.72, ZOOM_MAX = 1.85;
    let viewWidth = 0, viewHeight = 0, activeProjectIndex = null, pointerMoved = false, searchQuery = '';
    let lastNebulaUpdate = 0, lastConstellationUpdate = 0, forceSkyRefresh = true, forceConstellationRefresh = true;
    let lastRenderCamera = { x: camera.x, y: camera.y, zoom: camera.zoom };
    const starLayers = { back: [], mid: [], front: [] };
    const particles = [], shootingStars = [], cursorTrail = [];
    const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    const isLowPowerDevice = reduceMotionQuery.matches || (navigator.hardwareConcurrency || 8) <= 4;
    const qualityScale = isLowPowerDevice ? 0.62 : 1;
    let frameCount = 0;

    const projects = [
      { name: "Eleanor Roosevelt School App", team: "Roosevelt Connect Team", project_link: "roosevelt-connect.html", team_link: "teams.html#roosevelt-connect-team", description: "A reliable software platform for Roosevelt Connect initiatives, built through iterative design, prototyping, and testing.", status: "Deployed at Eleanor Roosevelt High School", stars: [{x:1540,y:710,r:4.4},{x:1630,y:640,r:3.8},{x:1715,y:715,r:5.2},{x:1638,y:818,r:4.3},{x:1765,y:805,r:3.4}], connections: [[0,1],[1,2],[2,3],[3,0],[2,4]] },
      { name: "Intelligrader AP FRQ Assistant", team: "Intelligrader Team", project_link: "intelligrader.html", team_link: "teams.html#intelligrader-team", description: "Scores APUSH and AP Euro FRQs with or without extra context and gives targeted feedback that helps students refine historical writing.", status: "Done and Deployed", stars: [{x:980,y:1210,r:4.4},{x:1070,y:1128,r:3.7},{x:1178,y:1214,r:5.0},{x:1088,y:1320,r:4.4},{x:1242,y:1280,r:3.2}], connections: [[0,1],[1,2],[2,3],[3,0],[2,4]] },
      { name: "Electronic Medical Recordkeeping System", team: "Virtual Medical Missions Team", project_link: "virtual-medical-missions.html", team_link: "teams.html#virtual-medical-missions-team", description: "A secure, scalable portal supporting virtual medical outreach, partnerships, fundraising, and care operations.", status: "Active", stars: [{x:1910,y:1180,r:4.1},{x:2000,y:1110,r:3.5},{x:2085,y:1186,r:5.1},{x:2010,y:1280,r:4.0},{x:2142,y:1252,r:3.0}], connections: [[0,1],[1,2],[2,3],[3,0],[2,4]] }
    ];

    function normalizeText(v) { return String(v||'').toLowerCase(); }
    function projectMatchesFilter(p, q) { if (!q) return true; return `${p.name} ${p.team} ${p.status}`.toLowerCase().includes(q); }
    function projectIsVisible(i) { return projects[i] ? projectMatchesFilter(projects[i], searchQuery) : false; }

    const nebula1 = new Image(), nebula2 = new Image();
    nebula1.src = "assets/img/nebula1.jpg"; nebula2.src = "assets/img/nebula2.avif";

    function waitForImageReady(img) { return new Promise(res => { const fin = () => { if (typeof img.decode==='function') img.decode().catch(()=>{}).finally(res); else res(); }; if (img.complete && img.naturalWidth>0) { fin(); return; } img.addEventListener('load',fin,{once:true}); img.addEventListener('error',()=>res(),{once:true}); }); }
    function rand(a,b) { return Math.random()*(b-a)+a; }
    function wrapValue(v,m) { return ((v%m)+m)%m; }
    function shortestWrappedDelta(d,s) { return ((d+s/2)%s+s)%s-s/2; }

    function resizeCanvases() {
      const dpr = Math.min(window.devicePixelRatio||1,2);
      viewWidth = sky.clientWidth; viewHeight = sky.clientHeight;
      [nebulaCanvas,backCanvas,midCanvas,frontCanvas,fxCanvas,shootingCanvas].forEach(c => { c.width=Math.floor(viewWidth*dpr); c.height=Math.floor(viewHeight*dpr); c.style.width=viewWidth+'px'; c.style.height=viewHeight+'px'; c.getContext('2d').setTransform(dpr,0,0,dpr,0,0); });
      svg.setAttribute('viewBox',`0 0 ${viewWidth} ${viewHeight}`);
      drawNebula(); updateConstellationPositions(); forceSkyRefresh=true; forceConstellationRefresh=true;
    }

    function generateStarLayer(count,sMin,sMax,aMin,aMax) { const s=[]; for(let i=0;i<count;i++) s.push({x:rand(0,world.width),y:rand(0,world.height),r:rand(sMin,sMax),alpha:rand(aMin,aMax),twinkleSpeed:rand(.2,1.1),twinkleOffset:rand(0,Math.PI*2)}); return s; }
    function initStars() { const va=window.innerWidth*window.innerHeight; const ds=Math.max(.55,Math.min(1,va/(1440*900))); const ms=window.innerWidth<768?.72:.9; const sc=ds*ms*qualityScale; starLayers.back=generateStarLayer(Math.floor(280*sc),.7,1.5,.14,.44); starLayers.mid=generateStarLayer(Math.floor(220*sc),1,2.2,.18,.66); starLayers.front=generateStarLayer(Math.floor(150*sc),1.3,3,.28,.96); }
    function getWrappedScreenPosition(wx,wy,par=1) { const bcx=camera.x*par,bcy=camera.y*par; const dx=shortestWrappedDelta(wx-bcx,world.width),dy=shortestWrappedDelta(wy-bcy,world.height); return {x:dx*camera.zoom+viewWidth/2,y:dy*camera.zoom+viewHeight/2}; }
    function screenToWorld(sx,sy) { return {x:wrapValue(camera.x+(sx-viewWidth/2)/camera.zoom,world.width),y:wrapValue(camera.y+(sy-viewHeight/2)/camera.zoom,world.height)}; }

    function drawNebula() { nebulaCtx.clearRect(0,0,viewWidth,viewHeight); const sx=wrapValue(camera.x*.05,world.width)/world.width,sy=wrapValue(camera.y*.04,world.height)/world.height; const sc=1.45,iW=viewWidth*sc,iH=viewHeight*sc,ox=-(sx*(iW-viewWidth)),oy=-(sy*(iH-viewHeight)); if(nebula1.complete){nebulaCtx.globalAlpha=.22;nebulaCtx.drawImage(nebula1,ox,oy,iW,iH);} if(nebula2.complete){nebulaCtx.globalAlpha=.16;nebulaCtx.drawImage(nebula2,ox-120,oy-80,iW*1.1,iH*1.1);} nebulaCtx.globalAlpha=1; }

    function drawStarAt(ctx,p,r,a) { if(p.x<-30||p.y<-30||p.x>viewWidth+30||p.y>viewHeight+30)return; ctx.beginPath(); ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill(); if(r>1.6){ctx.beginPath();ctx.strokeStyle=`rgba(140,200,255,${a*.35})`;ctx.lineWidth=1;ctx.moveTo(p.x-r*2.2,p.y);ctx.lineTo(p.x+r*2.2,p.y);ctx.moveTo(p.x,p.y-r*2.2);ctx.lineTo(p.x,p.y+r*2.2);ctx.stroke();} }
    function drawStarLayer(ctx,stars,par,t) { ctx.clearRect(0,0,viewWidth,viewHeight); for(const s of stars){const tw=.65+.35*Math.sin(t*s.twinkleSpeed+s.twinkleOffset),a=s.alpha*tw,r=s.r*(.8+.3*tw)*Math.max(.75,camera.zoom*.92),bcx=camera.x*par,bcy=camera.y*par,dx=shortestWrappedDelta(s.x-bcx,world.width),dy=shortestWrappedDelta(s.y-bcy,world.height),xO=[0],yO=[0];if(dx>world.width/2-220/camera.zoom)xO.push(-world.width);if(dx<-world.width/2+220/camera.zoom)xO.push(world.width);if(dy>world.height/2-220/camera.zoom)yO.push(-world.height);if(dy<-world.height/2+220/camera.zoom)yO.push(world.height);for(const ox of xO)for(const oy of yO)drawStarAt(ctx,{x:(dx+ox)*camera.zoom+viewWidth/2,y:(dy+oy)*camera.zoom+viewHeight/2},r,a);} }

    function spawnParticleBurst(x,y,count=20) { if(isLowPowerDevice)count=Math.max(6,Math.floor(count*.4)); for(let i=0;i<count;i++) particles.push({x,y,vx:rand(-1.8,1.8),vy:rand(-1.8,1.8),life:rand(18,36),maxLife:rand(18,36),size:rand(1.2,2.6)}); }
    function drawCursorTrail() { fxCtx.globalCompositeOperation="lighter"; for(let i=cursorTrail.length-1;i>=0;i--){const p=cursorTrail[i];p.life-=1;if(p.life<=0){cursorTrail.splice(i,1);continue;} if(i>0){const prev=cursorTrail[i-1],a=p.life/p.maxLife;fxCtx.beginPath();fxCtx.strokeStyle=`rgba(120,200,255,${a*.9})`;fxCtx.lineWidth=a*4;fxCtx.lineCap="round";fxCtx.moveTo(p.x,p.y);fxCtx.lineTo(prev.x,prev.y);fxCtx.stroke();} fxCtx.beginPath();fxCtx.fillStyle=`rgba(180,235,255,${(p.life/p.maxLife)*.7})`;fxCtx.arc(p.x,p.y,1.5+(p.life/p.maxLife)*2,0,Math.PI*2);fxCtx.fill();} fxCtx.globalCompositeOperation="source-over"; }
    function drawParticles() { if(isLowPowerDevice&&frameCount%2!==0)return; fxCtx.clearRect(0,0,viewWidth,viewHeight); for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.98;p.vy*=.98;p.life--;const a=p.life/p.maxLife;fxCtx.beginPath();fxCtx.fillStyle=`rgba(180,225,255,${a})`;fxCtx.arc(p.x,p.y,p.size,0,Math.PI*2);fxCtx.fill();if(p.life<=0)particles.splice(i,1);} drawCursorTrail(); }
    function maybeSpawnShootingStar() { const ch=isLowPowerDevice?.004:.012,mx=isLowPowerDevice?1:3; if(Math.random()>ch||shootingStars.length>mx)return; shootingStars.push({x:rand(viewWidth*.15,viewWidth*.85),y:rand(20,viewHeight*.35),vx:rand(9,14),vy:rand(4,7),life:0,maxLife:rand(28,42),length:rand(100,180)}); }
    function spawnClickComet(x,y) { shootingStars.push({x,y,vx:rand(7,12),vy:rand(2.4,5.2),life:0,maxLife:42,length:rand(90,150)}); }
    function drawShootingStars() { shootingCtx.clearRect(0,0,viewWidth,viewHeight); maybeSpawnShootingStar(); for(let i=shootingStars.length-1;i>=0;i--){const s=shootingStars[i];s.x+=s.vx;s.y+=s.vy;s.life++;const a=1-(s.life/s.maxLife);const g=shootingCtx.createLinearGradient(s.x,s.y,s.x-s.length,s.y-s.length*.4);g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(.25,`rgba(160,210,255,${a*.75})`);g.addColorStop(1,'rgba(160,210,255,0)');shootingCtx.beginPath();shootingCtx.strokeStyle=g;shootingCtx.lineWidth=2;shootingCtx.moveTo(s.x,s.y);shootingCtx.lineTo(s.x-s.length,s.y-s.length*.4);shootingCtx.stroke();if(s.life>=s.maxLife||s.x>viewWidth+220||s.y>viewHeight+220)shootingStars.splice(i,1);} }
    function projectCenter(p) { return {x:p.stars.reduce((a,s)=>a+s.x,0)/p.stars.length,y:p.stars.reduce((a,s)=>a+s.y,0)/p.stars.length}; }

    function renderConstellations() {
      svg.innerHTML='';
      projects.forEach((project,index)=>{
        const g=document.createElementNS(SVG_NS,'g'); g.classList.add('constellation'); g.dataset.index=index;
        if(!projectIsVisible(index))g.classList.add('filtered');
        if(activeProjectIndex===index)g.classList.add('active');
        const hb=document.createElementNS(SVG_NS,'circle'); hb.classList.add('constellation-hitbox'); hb.setAttribute('fill','transparent'); hb.setAttribute('pointer-events',projectIsVisible(index)?'all':'none'); g.appendChild(hb);
        project.connections.forEach(()=>{const l=document.createElementNS(SVG_NS,'line');l.classList.add('constellation-line');g.appendChild(l);});
        project.stars.forEach((s,si)=>{const c=document.createElementNS(SVG_NS,'circle');c.classList.add('constellation-star');if(si===2||s.r>=5)c.classList.add('constellation-core');g.appendChild(c);});
        const lbl=document.createElementNS(SVG_NS,'text'); lbl.classList.add('constellation-label'); lbl.textContent=project.name; g.appendChild(lbl);
        const sub=document.createElementNS(SVG_NS,'text'); sub.classList.add('constellation-subtext'); sub.textContent=project.team; g.appendChild(sub);
        g.addEventListener('click',e=>{e.stopPropagation();warpJump();focusProject(index);openProject(index);});
        g.addEventListener('mouseenter',()=>{const c=projectCenter(project),sc=getWrappedScreenPosition(c.x,c.y,1);spawnParticleBurst(sc.x,sc.y,18);if(activeProjectIndex===null)g.classList.add('active');});
        g.addEventListener('mouseleave',()=>{if(activeProjectIndex===null)g.classList.remove('active');});
        svg.appendChild(g);
      });
      updateConstellationPositions();
    }

    function updateConstellationPositions() {
      svg.querySelectorAll('.constellation').forEach((g,pi)=>{
        const project=projects[pi],vis=projectIsVisible(pi);
        g.classList.toggle('filtered',!vis);
        const hb=g.querySelector('.constellation-hitbox');
        if(hb){const c=projectCenter(project),p=getWrappedScreenPosition(c.x,c.y,1);hb.setAttribute('cx',p.x);hb.setAttribute('cy',p.y);hb.setAttribute('r',window.innerWidth<768?180:130);hb.setAttribute('pointer-events',vis?'all':'none');}
        g.querySelectorAll('.constellation-line').forEach((line,i)=>{const[a,b]=project.connections[i],p1=getWrappedScreenPosition(project.stars[a].x,project.stars[a].y,1),p2=getWrappedScreenPosition(project.stars[b].x,project.stars[b].y,1);if(Math.abs(p1.x-p2.x)>viewWidth/2||Math.abs(p1.y-p2.y)>viewHeight/2){line.setAttribute('opacity','0');}else{line.setAttribute('opacity','1');line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);}});
        g.querySelectorAll('.constellation-star').forEach((c,i)=>{const s=project.stars[i],p=getWrappedScreenPosition(s.x,s.y,1);c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',Math.max(2.3,s.r*camera.zoom*.9));});
        const ctr=projectCenter(project),lp=getWrappedScreenPosition(ctr.x+24,ctr.y-26,1),sp=getWrappedScreenPosition(ctr.x+24,ctr.y-8,1);
        const lbl=g.querySelector('.constellation-label'),sub=g.querySelector('.constellation-subtext');
        lbl.setAttribute('x',lp.x);lbl.setAttribute('y',lp.y);sub.setAttribute('x',sp.x);sub.setAttribute('y',sp.y);
        const near=lp.x>-260&&lp.x<viewWidth+260&&lp.y>-100&&lp.y<viewHeight+100;
        lbl.style.opacity=near||activeProjectIndex===pi?'':'0';sub.style.opacity=near||activeProjectIndex===pi?'':'0';
      });
    }

    function openProject(index) {
      if(!projectIsVisible(index))return;
      activeProjectIndex=index;
      const p=projects[index],tl=p.team||'Team';
      panelContent.innerHTML=`<h3>${p.name}</h3>${p.project_link?`<a href="${p.project_link}" class="project-panel-tag">Project Page →</a>`:''}<a href="${p.team_link}" class="project-panel-tag">${tl} →</a><p>${p.description}</p><div class="project-meta">Status: ${p.status}</div>`;
      panel.classList.add('show');
      svg.querySelectorAll('.constellation').forEach((g,i)=>g.classList.toggle('active',i===index));
      syncDirectoryActive(); forceConstellationRefresh=true;
    }
    function closeProject() { activeProjectIndex=null; panel.classList.remove('show'); svg.querySelectorAll('.constellation').forEach(g=>g.classList.remove('active')); syncDirectoryActive(); forceConstellationRefresh=true; }
    function syncDirectoryActive() { projectDirectory?.querySelectorAll('[data-project-index]').forEach(it=>it.classList.toggle('active',activeProjectIndex===+it.getAttribute('data-project-index'))); }
    function renderDirectory() {
      if(!projectDirectory)return;
      const vis=projects.map((p,i)=>({p,i})).filter(({i})=>projectIsVisible(i));
      if(!vis.length){projectDirectory.innerHTML='<div class="project-empty">No matches. Try a different keyword.</div>';return;}
      projectDirectory.innerHTML=vis.map(({p,i})=>`<button type="button" class="project-item${activeProjectIndex===i?' active':''}" data-project-index="${i}" aria-label="Open ${p.name}"><h4>${p.name}</h4><p>${p.team}</p><span class="status">${p.status}</span></button>`).join('');
    }
    function applyFilter(q) { searchQuery=normalizeText(q).trim(); if(activeProjectIndex!==null&&!projectIsVisible(activeProjectIndex))closeProject(); renderConstellations(); renderDirectory(); forceConstellationRefresh=true; }
    function warpJump() { sky.classList.add('warping'); setTimeout(()=>sky.classList.remove('warping'),120); }
    function focusProject(i) { const c=projectCenter(projects[i]); camera.targetX=wrapValue(c.x,world.width); camera.targetY=wrapValue(c.y,world.height); camera.targetZoom=1.28; camera.isAutoCentering=true; forceSkyRefresh=true; forceConstellationRefresh=true; }
    function applyZoom(cx,cy,dz) { const r=sky.getBoundingClientRect(),px=cx-r.left,py=cy-r.top,bef=screenToWorld(px,py); camera.targetZoom=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,camera.targetZoom*dz)); camera.targetX=wrapValue(bef.x-(px-viewWidth/2)/camera.targetZoom,world.width); camera.targetY=wrapValue(bef.y-(py-viewHeight/2)/camera.targetZoom,world.height); forceSkyRefresh=true; forceConstellationRefresh=true; }
    function onPointerDown(e) { camera.isDragging=true; pointerMoved=false; sky.classList.add('dragging'); camera.lastPointerX=e.clientX; camera.lastPointerY=e.clientY; camera.vx=0; camera.vy=0; }
    function onPointerMove(e) { if(!camera.isDragging)return; const dx=e.clientX-camera.lastPointerX,dy=e.clientY-camera.lastPointerY; if(Math.abs(dx)>1||Math.abs(dy)>1)pointerMoved=true; camera.lastPointerX=e.clientX; camera.lastPointerY=e.clientY; const wx=-dx/camera.zoom,wy=-dy/camera.zoom; camera.x+=wx; camera.y+=wy; camera.x=wrapValue(camera.x,world.width); camera.y=wrapValue(camera.y,world.height); camera.targetX=camera.x; camera.targetY=camera.y; camera.vx=camera.vx*.4+wx*.6; camera.vy=camera.vy*.4+wy*.6; forceSkyRefresh=true; forceConstellationRefresh=true; const r=sky.getBoundingClientRect(); cursorTrail.push({x:e.clientX-r.left,y:e.clientY-r.top,life:24,maxLife:24}); if(cursorTrail.length>35)cursorTrail.shift(); }
    function onPointerUp() { camera.isDragging=false; sky.classList.remove('dragging'); }

    function animate(now) {
      const t=now*.001; frameCount++;
      if(!camera.isDragging){
        const dx=shortestWrappedDelta(camera.targetX-camera.x,world.width),dy=shortestWrappedDelta(camera.targetY-camera.y,world.height);
        const cl=camera.isAutoCentering?.17:.085,zl=camera.isAutoCentering?.15:.08;
        camera.x=wrapValue(camera.x+dx*cl,world.width); camera.y=wrapValue(camera.y+dy*cl,world.height); camera.zoom+=(camera.targetZoom-camera.zoom)*zl;
        camera.x+=camera.vx; camera.y+=camera.vy; camera.x=wrapValue(camera.x,world.width); camera.y=wrapValue(camera.y,world.height); camera.vx*=.92; camera.vy*=.92;
        if(Math.abs(camera.vx)<.001)camera.vx=0; if(Math.abs(camera.vy)<.001)camera.vy=0;
        if(camera.isAutoCentering&&Math.abs(dx)+Math.abs(dy)<1.8&&Math.abs(camera.targetZoom-camera.zoom)<.01)camera.isAutoCentering=false;
        currentStarX+=(targetStarX-currentStarX)*.05; currentStarY+=(targetStarY-currentStarY)*.05;
        if(heroSection){heroSection.style.setProperty('--star-x',`${currentStarX}%`);heroSection.style.setProperty('--star-y',`${currentStarY}%`);}
      } else { camera.zoom+=(camera.targetZoom-camera.zoom)*.16; }
      const csx=Math.abs(shortestWrappedDelta(camera.x-lastRenderCamera.x,world.width)),csy=Math.abs(shortestWrappedDelta(camera.y-lastRenderCamera.y,world.height)),cs=csx+csy,zs=Math.abs(camera.zoom-lastRenderCamera.zoom);
      if(forceSkyRefresh||(now-lastNebulaUpdate>66&&(cs>.25||zs>.002))){drawNebula();lastNebulaUpdate=now;forceSkyRefresh=false;}
      if(!camera.isAutoCentering&&Math.abs(camera.vx)+Math.abs(camera.vy)>1)particles.push({x:rand(0,viewWidth),y:rand(0,viewHeight),vx:rand(-.5,.5),vy:rand(-.5,.5),life:rand(20,40),maxLife:40,size:rand(1,2)});
      drawStarLayer(backCtx,starLayers.back,.35,t); drawStarLayer(midCtx,starLayers.mid,.6,t*1.2); drawStarLayer(frontCtx,starLayers.front,.95,t*1.45); drawParticles(); drawShootingStars();
      if(forceConstellationRefresh||(now-lastConstellationUpdate>33&&(cs>.15||zs>.0015))){updateConstellationPositions();lastConstellationUpdate=now;forceConstellationRefresh=false;}
      lastRenderCamera.x=camera.x; lastRenderCamera.y=camera.y; lastRenderCamera.zoom=camera.zoom;
      requestAnimationFrame(animate);
    }

    sky.addEventListener('mousedown',onPointerDown); window.addEventListener('mousemove',onPointerMove); window.addEventListener('mouseup',onPointerUp); window.addEventListener('mouseleave',onPointerUp);
    sky.addEventListener('touchstart',e=>{if(e.touches.length===1)onPointerDown(e.touches[0]);},{passive:false});
    window.addEventListener('touchmove',e=>{if(e.touches.length===1&&camera.isDragging)onPointerMove(e.touches[0]);},{passive:false});
    window.addEventListener('touchend',onPointerUp); window.addEventListener('touchcancel',onPointerUp);
    sky.addEventListener('wheel',e=>{e.preventDefault();applyZoom(e.clientX,e.clientY,e.deltaY<0?1.12:.9);},{passive:false});
    sky.addEventListener('click',e=>{if(e.target.closest('.constellation,.#project-picker-wrap,#project-panel,#sky-tools'))return;if(pointerMoved)return;const r=sky.getBoundingClientRect();spawnClickComet(e.clientX-r.left,e.clientY-r.top);closeProject();});
    closePanelBtn.addEventListener('click',closeProject);
    zoomInBtn?.addEventListener('click',()=>{const r=sky.getBoundingClientRect();applyZoom(r.left+r.width/2,r.top+r.height/2,1.18);});
    zoomOutBtn?.addEventListener('click',()=>{const r=sky.getBoundingClientRect();applyZoom(r.left+r.width/2,r.top+r.height/2,.84);});
    fitViewBtn?.addEventListener('click',()=>{camera.targetX=world.width/2;camera.targetY=world.height/2;camera.targetZoom=1;forceSkyRefresh=true;forceConstellationRefresh=true;closeProject();});
    projectSearch?.addEventListener('input',()=>applyFilter(projectSearch.value));
    projectDirectory?.addEventListener('click',e=>{const it=e.target.closest('[data-project-index]');if(!it)return;warpJump();focusProject(+it.getAttribute('data-project-index'));openProject(+it.getAttribute('data-project-index'));});
    window.addEventListener('resize',resizeCanvases);

    Promise.race([Promise.all([waitForImageReady(nebula1),waitForImageReady(nebula2)]),new Promise(r=>setTimeout(r,900))]).finally(()=>{initStars();resizeCanvases();applyFilter('');requestAnimationFrame(animate);});
  })();
</script>
</body>
