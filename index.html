<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eastvale Innovators</title>
    <link rel="icon" type="image/png" href="assets/img/logo_favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #293d62;
            --primary-light: #3d5278;
            --primary-dark: #1a2740;
            --accent: #4a9eff;
            --accent-glow: rgba(74, 158, 255, 0.3);
            --text-light: #f5f5f5;
            --text-dark: #1a1a1a;
            --bg-light: #ffffff;
            --bg-dark: #001f3f; /* darker navy shade */
            --gradient-1: linear-gradient(135deg, #4a9eff 0%, #4a9eff 100%);
            --gradient-2: linear-gradient(135deg, #1a2740 0%, #293d62 100%);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --star-x: 50%;
            --star-y: 50%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            background: var(--bg-dark);
            overflow-x: hidden;
            line-height: 1.6;
            /* cursor: none; */
        }

        h1, h2, h3 {
            font-family: 'Orbitron', 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            text-align: center;
            margin: 0.5rem 0;
            display: block;
            width: 100%;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            width: 100vw;
            max-width: none;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: var(--gradient-2);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/img/starfield.jpeg');
            background-size: 200% 200%;
            background-position: var(--star-x, 50%) var(--star-y, 50%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            pointer-events: none;
            transition: background-position 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
            opacity: 0.15;
        }

        /* 3D gear canvas - fixed to viewport, behind all content */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/img/P1010915%20(1).jpg') center/cover;
            opacity: 0.12;
            z-index: 1;
            transform: translateZ(0);
            animation: heroZoom 30s ease-in-out infinite alternate;
        }

        @keyframes heroZoom {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .hero-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(74, 158, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 158, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridDrift 40s linear infinite;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            text-align: center;
            max-width: 100%;
            padding: 0 2rem;
            animation: fadeInDown 1s ease 0.2s backwards, heroFloat 6s ease-in-out infinite;
            perspective: 900px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heroFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hero h1 {
            font-size: clamp(3.5rem, 8vw, 6rem);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.12s ease-out;
            transform-style: preserve-3d;
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: rgba(255, 255, 255, 0.85);
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        #tile-transition {
            position: fixed;
            inset: 0;
            z-index: 20000;
            pointer-events: none;
            display: grid;
            background: black; /* prevents page flash */
        }

        .tile {
            background: black;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .tile.active {
            opacity: 1;
            transform: scale(1);
        }

        .tile.reveal {
            opacity: 0;
            transform: scale(0.9);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                max-width: none;
                margin: 0;
                width: 100vw;
            }
        }
    </style>
</head>
<body>
    <div id="page-content">
        <!-- Hero Section -->
        <section class="hero">
            <div id="canvas-container"></div>
            <div class="hero-bg"></div>
            <div class="hero-grid"></div>
            <div class="hero-content">
                <h1>Eastvale Innovators</h1>
                <p class="hero-subtitle">Under Construction</p>
            </div>
        </section>
    </div>
    <div id="tile-transition"></div>
    <script>
        const heroSection = document.querySelector('.hero');
        const heroBg = document.querySelector('.hero-bg');

        // Track cursor movement for star effect with dynamic cropping
        let targetStarX = 50;
        let targetStarY = 50;
        let currentStarX = 50;
        let currentStarY = 50;

        document.addEventListener('mousemove', (e) => {
            if (!heroSection) return;
            const hero = heroSection.getBoundingClientRect();
            const relX = e.clientX - hero.left;
            const relY = e.clientY - hero.top;
            targetStarX = (relX / hero.width) * 100;
            targetStarY = (relY / hero.height) * 100;
        });

        // Preload starfield image
        const starfieldImg = new Image();
        starfieldImg.src = 'assets/img/starfield.jpeg';

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const pointLight = new THREE.PointLight(0x4a9eff, 1.5);
        pointLight.position.set(50, 50, 80);
        scene.add(pointLight);

        const loader = new THREE.OBJLoader();
        let gearGroup = null;
        let gearRotationY = 0;
        let gearVelocity = 0.0015;
        let gearAxle = null;

        loader.load('assets/models/gear.obj', (gear) => {
            gear.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.color.setHex(0x000000);
                    child.material.transparent = true;
                    child.material.opacity = 0.25;
                    child.material.depthWrite = false;
                }
            });

            gear.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(gear);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());
            const pivot = center.clone();

            gearGroup = new THREE.Group();
            gearGroup.add(gear);
            gear.position.copy(pivot).negate();

            // move gear to the right
            gearGroup.position.x = 30;
            gearGroup.position.y = 15;
            const scale = Math.min(container.clientWidth, container.clientHeight) / (size * 3.2);
            gear.scale.setScalar(scale);

            const tiltGroup = new THREE.Group();
            tiltGroup.add(gearGroup);
            tiltGroup.rotation.y = (45 * Math.PI) / 180;
            tiltGroup.rotation.x = -(25 * Math.PI) / 180;
            scene.add(tiltGroup);

            camera.position.set(0,0, size * 0.5);
            camera.lookAt(0, 0, 0);

            gearAxle = new THREE.Vector3(0, 0, 1);
        }, undefined, (error) => {
            console.error("Gear model load error:", error);
        });

        window.addEventListener('resize', () => {
            if (!container) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        let lightAngle = 0;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        function animate() {
            requestAnimationFrame(animate);
            // idle rotation when NOT scrolling
            if (gearGroup && gearAxle) {
                gearRotationY += gearVelocity;
                gearGroup.quaternion.setFromAxisAngle(gearAxle, gearRotationY);
                gearVelocity *= 0.85;
                if(gearVelocity < 0.0015){
                    gearVelocity = 0.0015;
                }
            }

            document.addEventListener("mousedown", () => {
                gearVelocity += 0.001;
            });

            currentStarX += (targetStarX - currentStarX) * 0.05;
            currentStarY += (targetStarY - currentStarY) * 0.05;

            heroSection.style.setProperty('--star-x', `${currentStarX}%`);
            heroSection.style.setProperty('--star-y', `${currentStarY}%`);

            lightAngle += 0.002;

            pointLight.position.x = Math.sin(lightAngle) * 80;
            pointLight.position.y = Math.cos(lightAngle) * 40;

            renderer.render(scene, camera);
        }
        animate();

        const heroTitle = document.querySelector(".hero h1");
        document.addEventListener("mousemove", (e) => {
            const rect = heroTitle.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            const offsetX = (e.clientX - centerX) / rect.width;
            const offsetY = (e.clientY - centerY) / rect.height;
            const rotateY = offsetX * 2;   // left/right tilt
            const rotateX = -offsetY * 1;  // slight depth tilt
            heroTitle.style.transform =
                `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        /* =========================
        TILE PAGE TRANSITION
        ========================= */

        const tileContainer = document.getElementById("tile-transition");

        const TILE_ROWS = 12;
        const TILE_COLS = 20;

        let tiles = [];


        /* Create grid */

        function createTiles() {

            tileContainer.innerHTML = "";

            tileContainer.style.gridTemplateRows = `repeat(${TILE_ROWS}, 1fr)`;
            tileContainer.style.gridTemplateColumns = `repeat(${TILE_COLS}, 1fr)`;

            tiles = [];

            for (let r = 0; r < TILE_ROWS; r++) {

                for (let c = 0; c < TILE_COLS; c++) {

                    const tile = document.createElement("div");
                    tile.className = "tile";

                    tile.dataset.row = r;
                    tile.dataset.col = c;

                    tileContainer.appendChild(tile);
                    tiles.push(tile);

                }

            }

        }


        /* diagonal order */

        function getTileOrder() {

            return tiles.slice().sort((a,b) => {

                const ar = Number(a.dataset.row);
                const ac = Number(a.dataset.col);

                const br = Number(b.dataset.row);
                const bc = Number(b.dataset.col);

                return (ar + ac) - (br + bc);

            });

        }


        /* cover animation */

        function coverTiles() {

            const ordered = getTileOrder();

            ordered.forEach((tile, i) => {

                setTimeout(() => {
                    tile.classList.add("active");
                }, i * 2);

            });

        }


        /* reveal animation */

        function revealTiles() {
            const ordered = getTileOrder().reverse();
            ordered.forEach((tile, i) => {
                setTimeout(() => {
                    tile.classList.remove("active");
                }, i * 2);
            });
            setTimeout(() => {
                tileContainer.style.background = "transparent";
            }, ordered.length * 2 - 240);
        }


        /* page navigation */

        function startTileNavigation(href) {

            coverTiles();

            setTimeout(() => {

                window.location.href = href;

            }, tiles.length * 2 + 200);

        }


        /* intercept links */

        document.querySelectorAll("a").forEach(link => {

            link.addEventListener("click", e => {

                const href = link.getAttribute("href");

                if (!href) return;
                if (href.startsWith("#")) return;
                if (href.startsWith("mailto:")) return;
                if (href.startsWith("tel:")) return;
                if (link.target === "_blank") return;

                e.preventDefault();

                startTileNavigation(href);

            });

        });


        /* reveal animation when page loads */

        document.addEventListener("DOMContentLoaded", () => {
            createTiles();
            /* instantly cover screen */
            tiles.forEach(tile => tile.classList.add("active"));
            /* allow browser to render tiles first */
            setTimeout(() => {
                revealTiles();
            }, 120);
        });
    </script>
</body>
</html>
