    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #121c2d;
            --primary-light: #1e2d4a;
            --primary-dark: #0a0f18;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-light: #e2e8f0;
            --text-dark: #0f172a;
            --bg-light: #ffffff;
            --bg-dark: #05080f; /* very dark, almost black navy */
            --bg-page: #05080f;
            --card-bg: rgba(8, 12, 22, 0.7);
            --gradient-1: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --gradient-2: linear-gradient(135deg, #0a0f18 0%, #121c2d 100%);
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --star-x: 50%;
            --star-y: 50%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            background: var(--bg-dark);
            overflow-x: clip;
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Orbitron', 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            text-align: center;
            margin: 0.5rem 0;
            display: block;
            width: 100%;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        /* Hero Section */
        .hero {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            background: var(--gradient-2);
            padding-top: 6rem;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 0 2rem;
            max-width: 900px;
            text-align: center;
            animation: fadeInDown 1s ease 0.2s backwards;
        }

        .hero-content::before {
            content: "";
            position: absolute;
            inset: -60px;
            background: radial-gradient(circle, rgba(74,158,255,0.18), transparent 70%);
            filter: blur(50px);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
        }

        /* Contact Section */
        .contact-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }

        .contact-intro {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .contact-intro h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-intro p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* Contact Container */
        .contact-container {
            max-width: 800px;
            margin: 0 auto 4rem;
            background: rgba(8, 12, 22, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 0;
            padding: 4rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            clip-path: polygon(
                30px 0, 
                100% 0, 
                100% calc(100% - 30px), 
                calc(100% - 30px) 100%, 
                0 100%, 
                0 30px
            );
        }

        .contact-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .contact-container:hover::before {
            opacity: 1;
        }

        .contact-container:hover {
            border-color: rgba(74, 158, 255, 0.3);
            box-shadow: 0 20px 60px rgba(74, 158, 255, 0.2);
        }

        .form-group {
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: rgba(8, 12, 22, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 0;
            padding: 1.2rem;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
            box-sizing: border-box;
            clip-path: polygon(
                10px 0, 
                100% 0, 
                100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 
                0 100%, 
                0 10px
            );
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.7);
            background: rgba(8, 12, 22, 0.9);
            box-shadow: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: rgba(59, 130, 246, 0.1);
            color: white;
            border: 1px solid var(--accent);
            border-radius: 0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            overflow: hidden;
            clip-path: polygon(
                15px 0, 
                100% 0, 
                100% calc(100% - 15px), 
                calc(100% - 15px) 100%, 
                0 100%, 
                0 15px
            );
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 15px 40px var(--accent-glow);
        }

        /* Contact Info */
        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2.5rem;
            margin-bottom: 3rem;
        }

        .info-card {
            background: rgba(8, 12, 22, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 0;
            padding: 2.5rem;
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            clip-path: polygon(
                15px 0, 
                100% 0, 
                100% calc(100% - 15px), 
                calc(100% - 15px) 100%, 
                0 100%, 
                0 15px
            );
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .info-card:hover::before {
            opacity: 1;
        }

        .info-card:hover {
            background: rgba(59, 130, 246, 0.05);
            transform: translateY(-8px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 15px 40px rgba(74, 158, 255, 0.2);
        }

        .info-card h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--accent);
            position: relative;
            z-index: 1;
        }

        .info-card p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .info-card a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .info-card a:hover {
            color: var(--accent);
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .social-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.5rem;
            transition: var(--transition);
            position: relative;
        }

        .social-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .contact-layout{
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:4rem;
            align-items:start;
        }

        .contact-left{
            display:flex;
            flex-direction:column;
            gap:2.5rem;
        }

        .contact-info{
            display:flex;
            flex-direction:column;
            gap:1.5rem;
        }

        select{
            width:100%;
            padding:1rem 1.5rem;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:15px;
            color:white;
            font-size:1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            box-sizing: border-box;
        }

        select:focus{
            outline:none;
            border-color:var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #tile-transition {
            position: fixed;
            inset: 0;
            z-index: 20000;
            pointer-events: none;
            display: grid;
            background: black; /* prevents page flash */
        }

        .tile {
            background: black;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .tile.active {
            opacity: 1;
            transform: scale(1);
        }

        .tile.reveal {
            opacity: 0;
            transform: scale(0.9);
        }

        /* STARFIELD BACKGROUND */
        .starfield {
            position: absolute;
            inset: 0;
            background-image: url("assets/img/starfield3.jpeg");
            background-size: 150% 150%;
            background-position: var(--star-x) var(--star-y);
            background-repeat: no-repeat;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            transition: background-position 0.25s ease-out;
        }


        .star-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(74,158,255,0.20), transparent 35%),
                radial-gradient(circle at 80% 60%, rgba(74,158,255,0.12), transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.08), transparent 25%);
            pointer-events: none;
            z-index: 1;
        }


        /* subtle star drift */

        @keyframes starDrift{
            from{
                transform:translateY(0px);
            }
            to{
                transform:translateY(-120px);
            }
        }

        .hero {
            height: 58vh;
            min-height: 440px;
        }

        .contact-section {
            max-width: 1280px;

        }

        }

        .contact-left {

        }

        .contact-intro {

        }

        .contact-intro h2 {

        }

        .contact-intro p {

        .contact-info {

        .info-card {

        .info-card h3 {

        .info-card:hover {

        .social-links {

        }

        .contact-container {
            max-width: none;

        }

        .form-group {

        }

        .form-group textarea {

        }

        select {
            border-radius: 0;

            background: rgba(8, 12, 22, 0.7);
            clip-path: polygon(
                10px 0,

            );
        }

        .submit-btn {

            background: rgba(59, 130, 246, 0.26);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .contact-layout {

        }

        @media (max-width: 768px) {

    </style>

    <div id="tile-transition"></div>
    <script>

        // Form submission
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            this.reset();
        });

        const tileContainer = document.getElementById("tile-transition");
        const TILE_ROWS = 12;
        const TILE_COLS = 20;
        let tiles = [];

        function createTiles() {
            if (!tileContainer) return;

            tileContainer.innerHTML = "";
            tileContainer.style.gridTemplateRows = `repeat(${TILE_ROWS}, 1fr)`;
            tileContainer.style.gridTemplateColumns = `repeat(${TILE_COLS}, 1fr)`;

            tiles = [];

            for (let r = 0; r < TILE_ROWS; r++) {
                for (let c = 0; c < TILE_COLS; c++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    tileContainer.appendChild(tile);
                    tiles.push(tile);
                }
            }
        }

        function getTileOrder() {
            return tiles.slice().sort((a, b) => {
                const ar = Number(a.dataset.row);
                const ac = Number(a.dataset.col);
                const br = Number(b.dataset.row);
                const bc = Number(b.dataset.col);
                return (ar + ac) - (br + bc);
            });
        }

        function coverTiles() {
            const ordered = getTileOrder();
            ordered.forEach((tile, i) => {
                setTimeout(() => {
                    tile.classList.add("active");
                }, i * 2);
            });
        }

        function revealTiles() {
            const ordered = getTileOrder().reverse();
            ordered.forEach((tile, i) => {
                setTimeout(() => {
                    tile.classList.remove("active");
                }, i * 2);
            });
            setTimeout(() => {
                tileContainer.style.background = "transparent";
            }, ordered.length * 2 - 240);
        }

        function startTileNavigation(href) {
            coverTiles();

            setTimeout(() => {
                window.location.href = href;
            }, tiles.length * 2 + 200);
        }

        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", e => {
                const href = link.getAttribute("href");

                if (!href) return;
                if (href.startsWith("#")) return;
                if (href.startsWith("mailto:")) return;
                if (href.startsWith("tel:")) return;
                if (link.target === "_blank") return;
                if (link.classList.contains("dropdown-toggle")) return;
                if (link.closest(".dropdown-menu")) return;

                e.preventDefault();
                startTileNavigation(href);
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            createTiles();
            tiles.forEach(tile => tile.classList.add("active"));
            setTimeout(() => {
                revealTiles();
            }, 120);
        });

        const heroSection = document.getElementById("hero");

    let targetStarX = 50;
    let targetStarY = 50;
    let currentStarX = 50;
    let currentStarY = 50;

    document.addEventListener("mousemove", (e) => {
        if (!heroSection) return;

        const rect = heroSection.getBoundingClientRect();

        if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
            const relX = (e.clientX - rect.left) / rect.width;
            const relY = (e.clientY - rect.top) / rect.height;

            targetStarX = 50 + (relX - 0.5) * 28;
            targetStarY = 50 + (relY - 0.5) * 28;
        }
    });

    function animateStarfield() {
        currentStarX += (targetStarX - currentStarX) * 0.06;
        currentStarY += (targetStarY - currentStarY) * 0.06;

        if (heroSection) {
            heroSection.style.setProperty("--star-x", `${currentStarX}%`);
            heroSection.style.setProperty("--star-y", `${currentStarY}%`);
        }

        requestAnimationFrame(animateStarfield);
    }

    animateStarfield();
    </script>
</body>
</html>
